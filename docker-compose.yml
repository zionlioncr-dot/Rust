version: "3.9"

services:

  postgres:
    image: postgres:16

    container_name: postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: financial
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d financial"]
      interval: 10s
      timeout: 5s
      retries: 5

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.7

    container_name: redpanda

    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://redpanda:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092

    ports:
      - "9092:9092"
      - "9644:9644"

    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 15s
      timeout: 5s
      retries: 5

  console:
    image: docker.redpanda.com/redpandadata/console:v2.6.0

    container_name: redpanda-console

    depends_on:
      redpanda:
        condition: service_healthy

    environment:
      KAFKA_BROKERS: redpanda:9092

    ports:
      - "8080:8080"

volumes:
  postgres_data: